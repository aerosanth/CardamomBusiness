name: Daily Cardamom Data Scrape

on:
  schedule:
    # Run every day at 15:30 UTC (9:00 PM IST)
    - cron: '30 15 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run scraper
      run: |
        python scraper.py

    - name: Commit and push changes
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add cardamom_data.db
        git commit -m "Update: Daily cardamom price data $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
        git push

    - name: Log scrape completion
      run: |
        echo "✓ Daily cardamom data scrape completed"
        echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
